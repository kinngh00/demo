spring.application.name=Study

# PostgreSQL dummy defaults (override with env vars later)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/study}
spring.datasource.username=${DB_USERNAME:study}
spring.datasource.password=${DB_PASSWORD:study}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep startup running even when PostgreSQL is not up yet
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
